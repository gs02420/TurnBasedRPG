<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnBasedRPG</title>
        <style>
        .menu-container {
            height: 50px;
        }

        .action-menu {
            display: none;
            position: absolute;
            top: 50px;
            left: 10px;
            background-color: white;
            border: 1px solid black;
            padding: 10px;
            z-index: 10;
        }
        button {
            width: 60px;
            height: 35px;
            cursor: pointer;
        }
        </style>
</head>
<body>
    <div class="menu-container">
        <button style="width: 60px; height: 35px;" onclick="toggleMenu('attackDiv')">Attack</button>
        <button style="width: 60px; height: 35px;" onclick="toggleMenu('otherDiv')">Other</button>
    </div>
    <div class="action-menu" id="attackDiv">
        <button style="width: 60px; height: 35px;"onclick="swordAttack()">⚔</button>
    </div>
    <div class="action-menu" id="otherDiv">
<button onclick="defendToggle()">Defend</button>
    </div>
    <canvas style="height: 100; width: device-width; display: block; background-color: rgb(67, 67, 163);" id="fightCanvas"></canvas>
    <p id="healthDisplay">enemyHealth = 100</p>
    <p id="playerHealthDisplay">playerHealth = 100</p>
    <p id="playerEnergyDisplay">playerEnergy = 10</p>
    <script>
        let enemyHealth = 100;
        let enemyDamage = 20;
        let playerHealth = 100;
        const baseEnemyDamage = 20;
        let playerEnergy = 10;
        let turnsElapsed = 0;
        let Display = document.getElementById('healthDisplay');
        let hpDisplay = document.getElementById('playerHealthDisplay');
        let nrgDisplay = document.getElementById('playerEnergyDisplay');        



function toggleMenu(menuId){
    document.getElementById('attackDiv').style.display = 'none';
    document.getElementById('otherDiv').style.display = 'none';

    document.getElementById(menuId).style.display = 'block';
}
        function swordAttack(){
            enemyHealth -= 20;
            playerEnergy -= 2;
            document.getElementById('attackDiv').style.display = 'none';
            enemyTurn();
            changeDisplay();
        }
        function defendToggle(){
enemyDamage = baseEnemyDamage / 2;
document.getElementById('otherDiv').style.display = 'none';
enemyTurn();
turnsElapsed += 1;
if (turnsElapsed >= 2){
enemyDamage = baseEnemyDamage;
turnsElapsed = 0;
}
changeDisplay();
        }
        function enemyTurn(){
            playerHealth = playerHealth - enemyDamage;
        }
        function changeDisplay(){
            Display.textContent = `enemyHealth = ${enemyHealth}`
            hpDisplay.textContent = `playerHealth = ${playerHealth}`
            nrgDisplay.textContent = `playerEnergy = ${playerEnergy}`
        }
        
    </script>
</body>
</html>
