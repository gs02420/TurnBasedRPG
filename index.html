<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnBasedRPG</title>
</head>
<body>
    <div height="100px">
        <button style="width: 60px; height: 35px;" onclick="weaponToggle()">Attack</button>
        <button style="width: 60px; height: 35px;" onclick="otherToggle()">Other</button>
    </div>
    <div style="top: -100px; height: 100px; display: none; position: relative;" id="attackDiv">
        <button style="width: 60px; height: 35px;"onclick="swordAttack()">⚔</button>
    </div>
    <div style="top: -100px; height: 100px; display: none; position: relative;" id="otherDiv">
<button>hi</button>
    </div>
    <canvas style="height: 100; width: device-width; display: block;" id="fightCanvas"></canvas>
    <p id="healthDisplay">enemyHealth = 100</p>
    <script>
        let enemyHealth = 100;
        let Display = document.getElementById('healthDisplay');
        let weaponPick = document.getElementById('attackDiv');
        let otherPick = document.getElementById('otherDiv');

        function otherToggle(){
otherPick.style.display = 'block';
        }
        function weaponToggle(){
weaponPick.style.display ='block';
        }
        function swordAttack(){
            enemyHealth -= 20;
            weaponPick.style.display = 'none';
            Display.textContent = `enemyHealth = ${enemyHealth}`
        }
        
    </script>
</body>
</html>
